run:
  timeout: 3m
  tests: true

linters:
  disable-all: true
  enable:
    - gofumpt
    - govet
    - staticcheck
    - revive
    - errcheck
    - gosec
    - unparam
    - unused
    - gocritic
    - bodyclose
    - contextcheck
    - nilerr
    - rowserrcheck
    - sqlclosecheck
    - wastedassign
    - misspell

linters-settings:
  revive:
    rules:
      - name: var-naming
      - name: package-comments
      - name: exported
      - name: if-return
      - name: empty-block
      - name: superfluous-else

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
        - errcheck
